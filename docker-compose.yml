services:
  hermes-webui:
    build: .
    container_name: hermes-gion-webui
    ports:
      # 建議綁定 localhost，這樣只有本機可以訪問，比較安全
      - "127.0.0.1:8787:8787"
    
    volumes:
      # 【核心修改 1】
      # 將宿主機的 Core 專案目錄，掛載到容器內的 /home/hermeswebui/.hermes
      # 這樣容器就會直接讀取您的 gion-local-core 設定，完全忽略 ~/.hermes
      - /Users/max/gion-local-core:/home/hermeswebui/.hermes
      
      # 【核心修改 2】
      # 將宿主機的 WebUI 專案目錄，掛載到容器內的 /workspace
      # 這樣 WebUI 啟動時就能看到您的原始碼或工作區
      - /Users/max/hermes-webui:/workspace

    environment:
      # 【macOS 必填】
      # 讓容器內的檔案權限跟您的 macOS 使用者一致，避免 Permission Denied
      - WANTED_UID=${UID:-501}
      - WANTED_GID=${GID:-20}
      
      # 設定 WebUI 的監聽地址
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      
      # 【核心修改 3】
      # 強制指定狀態目錄。
      # 因為我們上面已經把 .hermes 掛載進來了，所以這裡指向容器內的對應路徑
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui-state

      # 如果 WebUI 需要讀取特定環境變數（如 API Key），建議在 gion-local-core 內的 .env 檔設定
      # 或者在這裡手動加入 - OPENAI_API_KEY=sk-xxxx

    restart: unless-stopped
