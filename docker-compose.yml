# Gion Local Core — canonical single-container Docker Compose.
# Multi-container experiments are not kept in main branch. Keep this file as
# the only supported Docker install source.

services:
  hermes-webui:
    image: ${HERMES_WEBUI_IMAGE:-ghcr.io/nesquena/hermes-webui:latest}
    ports:
      # Localhost-only by default. Do not remove 127.0.0.1 unless you also set
      # HERMES_WEBUI_PASSWORD and understand the network exposure.
      - "127.0.0.1:${HERMES_WEBUI_PORT:-8787}:8787"
    volumes:
      - ${HERMES_HOME:-${HOME}/Hermes_Gion_Core}:/home/hermeswebui/.hermes
      - ${HERMES_WORKSPACE:-${HOME}/Hermes_Gion_Core/Public_Welfare_Project}:/workspace
    environment:
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui_history
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_BOT_NAME=${HERMES_WEBUI_BOT_NAME:-Gion_守護者}
      - HERMES_WEBUI_PASSWORD=${HERMES_WEBUI_PASSWORD:-}
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      - HERMES_SKIP_CHMOD=${HERMES_SKIP_CHMOD:-1}
      - HERMES_HOME_MODE=${HERMES_HOME_MODE:-0640}
    restart: unless-stopped
